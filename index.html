<!DOCTYPE html>

</head>

<body>

<header>
    <nav class="navbar">
        <div class="logo">Portfolio</div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>

        <ul class="nav-links" id="nav">
            <li><a onclick="showSection('about')">About</a></li>
            <li><a onclick="showSection('education')">Education</a></li>
            <li><a onclick="showSection('skills')">Skills</a></li>
            <li><a onclick="showSection('contact')">Contact</a></li>
        </ul>

</header>

<!-- ABOUT -->

    <img src="https://github.com/Tanvi-Hadole/My-portfolio/blob/cfe08df36b6d3622ee5fe6a786de17e685180fc6/Screenshot%202026-04-29%20184056.png" alt="My Image">

    <!-- SOCIAL ICONS -->
    <div class="social-icons">
        <a href="https://wa.me/919623827965" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.linkedin.com/in/Tanvi-Hadole" target="_blank"><i class="fab fa-linkedin"></i></a>
        <a href="https://github.com/Tanvi-Hadole" target="_blank"><i class="fab fa-github"></i></a>
        <a href="https://youtube.com/@Eduspark-n3z
" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>
</section>

<!-- EDUCATION -->
<section id="education" class="section">
    <h2>Education</h2>
    <div class="edu-cards">
        <div class="card">MHT-CET<br>96.38%</div>
        <div class="card">10th<br>95.85%</div>
        <div class="card">12th<br>78%</div>
    </div>
</section>

<!-- SKILLS -->
<section id="skills" class="section">
    <h2>Skills</h2>

    <p>Python</p><div class="progress"><div class="bar" style="width:75%"></div></div>
    <p>C</p><div class="progress"><div class="bar" style="width:85%"></div></div>
    <p>HTML</p><div class="progress"><div class="bar" style="width:80%"></div></div>
    <p>CSS</p><div class="progress"><div class="bar" style="width:70%"></div></div>

</section>

<!-- CONTACT -->
<section id="contact" class="section">
    <h2>Contact Me</h2>

    <form action="https://formsubmit.co/tanvihadole86@gmail.com" method="POST">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" value="New Portfolio Message!">

        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" required></textarea>

        <button type="submit">Send Message</button>
    </form>
</section>

<script>
function toggleMenu(){
    document.getElementById("nav").classList.toggle("active");
}

function showSection(id){
    const sections = document.querySelectorAll(".section");
    sections.forEach(sec => sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
